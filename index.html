<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTHL Cards</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js?v=4" defer></script>
</head>
<body>

    <!-- Индикатор/Кнопка облачной синхронизации -->
    <button class="export-btn" id="cloudSyncBtn" style="right: 192px; color: var(--text-muted);" title="Cloud Sync">☁️</button>

    <input type="file" id="importFileInput" accept=".json" style="display: none;">
    <button class="import-btn" id="importBtn" title="Import JSON">↑</button>
    <button class="export-btn" id="exportBtn" title="Export JSON">↓</button>
    <button class="add-trigger-btn" id="openFormBtn" title="Add Card">+</button>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <!-- Лицевая сторона -->
            <div class="card-face card-front" id="cardFrontFace">
                <div class="badge" id="cardBadge">English</div>
                <div class="furigana" id="cardFurigana"></div>
                <h1 class="front-text" id="cardFrontText"></h1>
                <div class="ghost-hint" id="cardHint"></div>
            </div>
            
            <!-- Обратная сторона -->
            <div class="card-face card-back">
                <button class="edit-btn" id="editCardBtn">✎</button>
                <button class="speak-btn" id="speakCardBtn">🔊</button>
                
                <div class="back-text" id="cardBackText"></div>
                <div class="notes" id="cardNotes"></div>
            </div>
        </div>
    </div>

    <div class="actions" id="actions">
        <button id="refreshBtn">Refresh</button>
        <button id="gotItBtn">Got it</button>
    </div>

    <!-- Модальное окно настройки Облака -->
    <div class="form-overlay" id="cloudOverlay">
        <div class="form-panel">
            <button class="close-btn" id="closeCloudBtn">×</button>
            <h2 class="form-title">Cloud Sync Setup</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">
                Enter your GitHub Personal Access Token (with 'gist' scope) to enable seamless cross-device synchronization.
            </p>
            <form id="cloudSetupForm" autocomplete="off">
                <div class="input-group">
                    <input type="password" id="inputGithubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" required>
                </div>
                <button type="submit" class="submit-btn" style="background: var(--color-ja);">Connect to Cloud</button>
            </form>
        </div>
    </div>

    <!-- Существующая форма добавления карточек -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-panel" id="formPanel">
            <button class="close-btn" id="closeFormBtn">×</button>
            <h2 class="form-title" id="formTitle">Create Concept</h2>
            
            <form id="addCardForm" autocomplete="off">
                <div class="type-selector">
                    <label class="type-option option-en">
                        <input type="radio" name="cardType" value="english" checked>
                        <span>EN</span>
                    </label>
                    <label class="type-option option-ja">
                        <input type="radio" name="cardType" value="japanese">
                        <span>JA</span>
                    </label>
                    <label class="type-option option-zh">
                        <input type="radio" name="cardType" value="chinese">
                        <span>ZH</span>
                    </label>
                    <label class="type-option option-ko">
                        <input type="radio" name="cardType" value="korean">
                        <span>KO</span>
                    </label>
                </div>

                <div class="input-group">
                    <input type="text" id="inputFront" placeholder="Front (Term / Kanji / Hanzi / Hangul)" required>
                </div>
                
                <div class="input-group" id="readingGroup">
                    <input type="text" id="inputReading" placeholder="Pronunciation / Furigana">
                </div>

                <div class="input-group">
                    <input type="text" id="inputHint" placeholder="Hint (Ghost Text on Front - Optional)">
                </div>

                <div class="input-group">
                    <input type="text" id="inputBack" placeholder="Back (Meaning / Definition)" required>
                </div>

                <div class="input-group">
                    <textarea id="inputNotes" placeholder="Context, notes or example sentences..." rows="3"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Save to Deck</button>
            </form>
        </div>
    </div>

</body>
</html>
